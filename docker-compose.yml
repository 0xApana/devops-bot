version: '3.8'
services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    env_file: .env
    command: python dashboard_api.py
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./data:/app/data

