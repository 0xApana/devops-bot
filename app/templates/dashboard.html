<!DOCTYPE html>
<html>
<head>
    <title>DevOps Bot Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        h1 { color: #00d4ff; }
        .cards { display: flex; gap: 20px; margin: 20px 0; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; flex: 1; text-align: center; }
        .card h2 { color: #00d4ff; font-size: 40px; margin: 0; }
        .card p { color: #888; }
        canvas { max-width: 400px; margin: 20px auto; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #00d4ff; color: black; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <h1>🤖 DevOps Bot Dashboard — 0xApana</h1>
    <div class="cards">
        <div class="card">
            <h2 id="total">-</h2>
            <p>Total Users</p>
        </div>
        <div class="card">
            <h2 id="premium">-</h2>
            <p>Premium Users</p>
        </div>
        <div class="card">
            <h2 id="free">-</h2>
            <p>Free Users</p>
        </div>
    </div>
    <canvas id="chart"></canvas>
    <h2>👥 All Users</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Join Date</th>
            <th>Premium</th>
            <th>Questions Asked</th>
        </tr>
        <tbody id="users-table"></tbody>
    </table>
    <script>
        fetch('/stats').then(r => r.json()).then(data => {
            document.getElementById('total').textContent = data.total_users;
            document.getElementById('premium').textContent = data.premium_users;
            document.getElementById('free').textContent = data.free_users;
            new Chart(document.getElementById('chart'), {
                type: 'doughnut',
                data: {
                    labels: ['Free Users', 'Premium Users'],
                    datasets: [{
                        data: [data.free_users, data.premium_users],
                        backgroundColor: ['#0099ff', '#00d4ff']
                    }]
                }
            });
        });
        fetch('/users').then(r => r.json()).then(users => {
            const tbody = document.getElementById('users-table');
            users.forEach(u => {
                tbody.innerHTML += `<tr>
                    <td>${u.first_name || '-'}</td>
                    <td>@${u.username || '-'}</td>
                    <td>${u.join_date || '-'}</td>
                    <td>${u.is_premium ? '💎 Yes' : '❌ No'}</td>
                    <td>${u.ask_count}</td>
                </tr>`;
            });
        });
    </script>
</body>
</html>
